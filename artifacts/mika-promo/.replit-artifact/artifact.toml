kind = "video"
previewPath = "/"
title = "MIKA Promo Video"
version = "1.0.0"
id = "artifacts/mika-promo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23724

[services.development]
run = "pnpm --filter @workspace/mika-promo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mika-promo", "run", "build" ]
publicDir = "artifacts/mika-promo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23724"
BASE_PATH = "/"
