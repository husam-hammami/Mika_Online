openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: access
    description: Access request (email capture) operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /access-requests:
    get:
      operationId: listAccessRequests
      tags: [access]
      summary: List access requests
      description: Returns all captured access-request emails, newest first (owner view).
      responses:
        "200":
          description: A list of access requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccessRequest"
    post:
      operationId: createAccessRequest
      tags: [access]
      summary: Submit an access request
      description: Stores a visitor's early-access request so the owner can approve and email a download link. Idempotent on email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessRequestInput"
      responses:
        "201":
          description: Access request stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRequest"
        "200":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRequest"
        "400":
          description: Invalid email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /access-requests/summary:
    get:
      operationId: getAccessRequestSummary
      tags: [access]
      summary: Access request summary
      description: Aggregate stats about captured emails for the owner dashboard.
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessRequestSummary"
  /access-requests/{id}/download:
    get:
      operationId: downloadAccessRequest
      tags: [access]
      summary: Record a download and redirect to the installer
      description: >-
        Stamps the download against the access request (first-download time and
        an incremented count), then redirects the browser to the MIKA installer.
        Intended to be used as the href of the download link, not called via fetch.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "302":
          description: Redirect to the MIKA installer
          headers:
            Location:
              schema:
                type: string
        "404":
          description: Access request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AccessRequest:
      type: object
      required: [id, email, createdAt, downloadCount]
      properties:
        id:
          type: integer
        email:
          type: string
        createdAt:
          type: string
          format: date-time
        downloadedAt:
          type: ["string", "null"]
          format: date-time
          description: When this email first downloaded MIKA. Null if never downloaded.
        downloadCount:
          type: integer
          description: How many times the download link has been followed for this email.
    AccessRequestInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          minLength: 3
          maxLength: 320
        firstName:
          type: string
          maxLength: 50
          description: Applicant first name, shown in the approval queue.
        profession:
          type: string
          maxLength: 100
          description: Applicant profession, shown in the approval queue.
    AccessRequestSummary:
      type: object
      required: [total, today, downloaded, latestEmail, latestAt]
      properties:
        total:
          type: integer
        today:
          type: integer
        downloaded:
          type: integer
          description: Number of captured emails that have downloaded at least once.
        latestEmail:
          type: ["string", "null"]
        latestAt:
          type: ["string", "null"]
          format: date-time
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
